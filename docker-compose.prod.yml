services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: sistema_mateus
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/sistema_mateus?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-access-secret-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-please}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      SEED_ON_START: ${SEED_ON_START:-true}
    ports:
      - "3333:3333"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: ${API_URL:-http://localhost:3333}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata_prod:
